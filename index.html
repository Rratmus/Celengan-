<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tabungan 10K</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f2f2;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:15px;
}

.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2196F3;
    color:#fff;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1976D2;
}

#total{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:8px;
    max-width:700px;
    margin:auto;
}

.kotak{
    aspect-ratio:1/1;
    background:#fff;
    border:2px solid #2196F3;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    transition:.3s;
}

.kotak.aktif{
    background:#2196F3;
    color:#fff;
}
</style>
</head>
<body>

<h1>Tabungan 10K</h1>

<div class="menu">
    <button id="editBtn">Edit</button>
    <button id="saveBtn">Simpan</button>
</div>

<div id="total">Total: Rp0</div>

<div class="grid" id="grid"></div>

<script>

const grid=document.getElementById("grid");
const total=document.getElementById("total");

let editMode=false;

let data=JSON.parse(localStorage.getItem("tabungan10k"));

if(!data){
    data=new Array(100).fill(false);
}

function hitungTotal(){

    let jumlah=data.filter(v=>v).length;

    total.innerHTML="Total: Rp"+(jumlah*10000).toLocaleString("id-ID");

}

function tampilkan(){

    grid.innerHTML="";

    data.forEach((isi,index)=>{

        const kotak=document.createElement("div");

        kotak.className="kotak";

        if(isi){
            kotak.classList.add("aktif");
        }

        kotak.innerHTML="10k";

        kotak.onclick=function(){

            if(!editMode) return;

            data[index]=!data[index];

            tampilkan();

        }

        grid.appendChild(kotak);

    });

    hitungTotal();

}

tampilkan();

document.getElementById("editBtn").onclick=function(){

    editMode=!editMode;

    if(editMode){

        this.innerHTML="Selesai Edit";
        this.style.background="#4CAF50";

    }else{

        this.innerHTML="Edit";
        this.style.background="#2196F3";

    }

}

document.getElementById("saveBtn").onclick=function(){

    localStorage.setItem("tabungan10k",JSON.stringify(data));

    alert("Data berhasil disimpan!");

}

</script>

</body>
</html>
